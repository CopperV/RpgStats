      renewable: false
    dmg_obuchowe:
      display: "Obrazenia obuchowe"
      default-value: 0
      renewable: false
    dmg_klute:
      display: "Obrazenia klute"
      default-value: 0
      renewable: false
    dmg_magiczne:
      display: "Obrazenia magiczne"
      default-value: 0
      renewable: false
    dmg_ogien:
